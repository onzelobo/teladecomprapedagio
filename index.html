<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPO Monsanto - Velozter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white shadow-xl rounded-lg max-w-md w-full p-8 border-t-4 border-blue-600">
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-6 uppercase border-b pb-2">Compra Vale Pedágio</h1>
        
        <form id="vpoForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="placa" placeholder="PLACA" required class="border p-2 rounded uppercase focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="number" id="eixos" placeholder="EIXOS" required class="border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <input type="text" id="os" placeholder="ORDEM DE SERVIÇO (Ex: 4SSA...)" required class="w-full border p-2 rounded uppercase focus:ring-2 focus:ring-blue-400 outline-none">
            
            <div class="bg-blue-50 p-4 rounded border border-blue-100">
                <p class="text-xs font-bold text-blue-800 mb-2 uppercase italic">Origem (Cidade/UF)</p>
                <div class="flex gap-2">
                    <input type="text" id="orig_c" placeholder="Cidade" required class="flex-1 border p-2 rounded uppercase text-sm">
                    <input type="text" id="orig_uf" placeholder="UF" maxlength="2" required class="w-16 border p-2 rounded uppercase text-sm">
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded border border-gray-100">
                <p class="text-xs font-bold text-gray-600 mb-2 uppercase italic">Destino (Cidade/UF)</p>
                <div class="flex gap-2">
                    <input type="text" id="dest_c" placeholder="Cidade" required class="flex-1 border p-2 rounded uppercase text-sm">
                    <input type="text" id="dest_uf" placeholder="UF" maxlength="2" required class="w-16 border p-2 rounded uppercase text-sm">
                </div>
            </div>

            <button type="submit" id="btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition uppercase">Comprar VPO</button>
        </form>

        <div id="status" class="mt-6 p-4 rounded text-xs font-mono hidden overflow-auto max-h-40 bg-gray-800 text-green-400"></div>
    </div>

    <script>
        document.getElementById('vpoForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = 'PROCESSANDO...';
            status.classList.add('hidden');

            const body = {
                placa: document.getElementById('placa').value,
                os: document.getElementById('os').value,
                eixos: parseInt(document.getElementById('eixos').value),
                origem: { cidade: document.getElementById('orig_c').value, uf: document.getElementById('orig_uf').value },
                destino: { cidade: document.getElementById('dest_c').value, uf: document.getElementById('dest_uf').value }
            };

            try {
                const res = await fetch('/api/vpo/comprar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                status.classList.remove('hidden');
                status.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                alert("Erro na conexão com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'COMPRAR VPO';
            }
        }
    </script>
</body>
</html>
