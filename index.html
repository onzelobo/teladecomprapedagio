<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBR X LOG-IN COMPRA DE VALE PEDÁGIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white shadow-2xl rounded-lg max-w-md w-full p-8 border-t-8 border-[#00473D]">
        <h1 class="text-xl font-black text-[#00473D] text-center mb-6 uppercase tracking-tighter border-b pb-4">VBR X LOG-IN <br><span class="text-sm font-light text-gray-500">Compra de Vale Pedágio</span></h1>
        
        <form id="vpoForm" class="space-y-4">
            <!-- Campo de Placa -->
            <input type="text" id="placa" placeholder="PLACA" required class="w-full border p-2 rounded uppercase focus:ring-2 focus:ring-[#00473D] outline-none">
            <!-- Eixos removido da UI, valor fixo para 5 no backend -->
            <input type="text" id="os" placeholder="ORDEM DE SERVIÇO (Ex: 4SSA...)" required class="w-full border p-2 rounded uppercase focus:ring-2 focus:ring-[#00473D] outline-none">
            <input type="email" id="email" placeholder="E-MAIL DO RESPONSÁVEL" required class="w-full border p-2 rounded lowercase focus:ring-2 focus:ring-[#00473D] outline-none">
            
            <div class="bg-gray-100 p-4 rounded border border-gray-200 opacity-75">
                <p class="text-[10px] font-bold text-[#00473D] mb-2 uppercase italic">Origem (Fixo)</p>
                <div class="flex gap-2">
                    <input type="text" id="orig_c" value="CAMACARI" readonly tabindex="-1" class="flex-1 border p-2 rounded uppercase text-sm bg-gray-200 cursor-not-allowed">
                    <input type="text" id="orig_uf" value="BA" readonly tabindex="-1" class="w-16 border p-2 rounded uppercase text-sm bg-gray-200 cursor-not-allowed">
                </div>
            </div>

            <div class="bg-gray-100 p-4 rounded border border-gray-200 opacity-75">
                <p class="text-[10px] font-bold text-slate-600 mb-2 uppercase italic">Destino (Fixo)</p>
                <div class="flex gap-2">
                    <input type="text" id="dest_c" value="SALVADOR" readonly tabindex="-1" class="flex-1 border p-2 rounded uppercase text-sm bg-gray-200 cursor-not-allowed">
                    <input type="text" id="dest_uf" value="BA" readonly tabindex="-1" class="w-16 border p-2 rounded uppercase text-sm bg-gray-200 cursor-not-allowed">
                </div>
            </div>

            <button type="submit" id="btn" class="w-full bg-[#00473D] text-white font-bold py-4 rounded hover:opacity-90 transition uppercase shadow-lg">Efetuar Compra Log-In</button>
        </form>

        <div id="status" class="mt-6 p-4 rounded text-xs font-mono hidden overflow-auto max-h-40 bg-black text-[#f5f5f5]"></div>
    </div>

    <script>
        document.getElementById('vpoForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = 'PROCESSANDO...';
            status.classList.add('hidden');

            const body = {
                placa: document.getElementById('placa').value,
                os: document.getElementById('os').value,
                eixos: 5, // Valor fixo de 5 eixos
                email: document.getElementById('email').value,
                origem: { cidade: document.getElementById('orig_c').value, uf: document.getElementById('orig_uf').value },
                destino: { cidade: document.getElementById('dest_c').value, uf: document.getElementById('dest_uf').value }
            };

            try {
                const res = await fetch('/vpo/comprar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                let data;
                const contentType = res.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    data = await res.json();
                } else {
                    data = { detail: await res.text() };
                }

                status.classList.remove('hidden');
                
                // Feedback visual conforme guia de cores
                if (!res.ok) {
                    status.style.color = '#FBA100'; // Erro
                } else {
                    status.style.color = '#75B843'; // Sucesso
                }
                
                status.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                alert("Erro na conexão com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'EFETUAR COMPRA LOG-IN';
            }
        }
    </script>
</body>
</html>
